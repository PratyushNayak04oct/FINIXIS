# ================================================================
# Finixis — database connection settings
# ================================================================
# Set db.type to 'h2' (embedded, zero-setup) or 'postgresql'.
# For Oracle, set db.type=other and supply a full JDBC URL below.
# ================================================================

db.type=h2

# --- H2 (default embedded mode; data lives in ~/finixis-data/) ---
h2.url=jdbc:h2:~/finixis-data/finixis;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
h2.user=sa
h2.password=

# --- PostgreSQL (uncomment and fill in when going to production) ---
# pg.url=jdbc:postgresql://localhost:5432/finixis
# pg.user=finixis_user
# pg.password=your_password_here

# --- HikariCP pool settings ---
pool.maximumPoolSize=10
pool.minimumIdle=2
pool.connectionTimeoutMs=30000
pool.idleTimeoutMs=600000
pool.maxLifetimeMs=1800000
