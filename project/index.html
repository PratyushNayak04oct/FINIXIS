<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finixis — Download</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Inter, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b1120;
      color: #e2e8f0;
    }
    .card {
      max-width: 560px;
      width: calc(100% - 40px);
      background: #111827;
      border: 1px solid #243044;
      border-radius: 16px;
      padding: 44px 40px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 20px;
      background: #1d4ed8;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; color: #fff; font-weight: 700;
    }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 28px; font-size: 15px; }
    .stats {
      display: flex; gap: 12px; margin-bottom: 28px;
      flex-wrap: wrap; justify-content: center;
    }
    .stat {
      background: #1e293b; border-radius: 10px; padding: 10px 16px;
      font-size: 13px; color: #cbd5e1;
    }
    .stat b { color: #60a5fa; font-size: 18px; display: block; }
    a.btn {
      display: inline-block;
      background: #2563eb; color: #fff;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 10px;
      font-size: 16px; font-weight: 600;
      transition: background 0.15s;
    }
    a.btn:hover { background: #1d4ed8; }
    .note {
      margin-top: 22px; font-size: 12px; color: #64748b;
      line-height: 1.5;
    }
    code {
      background: #1e293b; padding: 2px 8px; border-radius: 6px;
      font-size: 13px; color: #34d399;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">F</div>
    <h1>Finixis — UI-Only MVP</h1>
    <p>JavaFX 21 + Maven prototype (customer demo). All 10 pages, both themes, role switcher, mock data.</p>
    <div class="stats">
      <div class="stat"><b>25</b>Java files</div>
      <div class="stat"><b>10</b>FXML pages</div>
      <div class="stat"><b>2</b>themes</div>
      <div class="stat"><b>25 KB</b>zip size</div>
    </div>
    <a class="btn" href="/finixis.zip" download>Download Project (.zip)</a>
    <div class="note">
      Unzip, then run: <code>cd finixis && mvn clean javafx:run</code><br>
      Requires Java 21+ and a display.
    </div>
  </div>
  <script type="module">
    // Serve the static zip via fetch so the download link resolves correctly
  </script>
</body>
</html>
